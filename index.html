<html lang="th">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Kanit&display=swap" rel="stylesheet">

<style>
/* ===== BASE ===== */
body{
  font-family:'Kanit',sans-serif;
  margin:0;
  color:#2c3e50;

  background:
  radial-gradient(circle at top left,#6ea8ff 0%,transparent 35%),
  radial-gradient(circle at bottom right,#7ed6a7 0%,transparent 35%),
  #eef3ff;

  min-height:100vh;
}

.container{
  max-width:520px;
  margin:auto;
  padding:16px;
}

/* ===== CARD ===== */
.card{
  background:rgba(255,255,255,0.85);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);

  border-radius:18px;
  padding:18px;
  margin-bottom:16px;

  border:1px solid rgba(255,255,255,0.5);

  box-shadow:
  0 8px 25px rgba(0,0,0,0.08),
  inset 0 1px 0 rgba(255,255,255,0.8);
}

h2{
  text-align:center;
  font-size:20px;
  font-weight:700;
  margin-bottom:16px;
  color:#1e293b;
}

/* ===== INPUT ===== */
.input-box{
  display:flex;
  justify-content:center;
  margin-bottom:12px;
}

.input-box input{
  width:100%;
  max-width:260px;
  padding:10px;
  border-radius:8px;
  border:1px solid #dcdfe6;
  box-sizing:border-box;
}
.input-box input:focus{
  outline:none;
  border-color:#4da3ff;
  box-shadow:0 0 0 3px rgba(77,163,255,0.15);
}

/* ===== BUTTON GRID ===== */
.btn-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-bottom:10px;
}

/* ===== BUTTON ===== */
.btn{
  padding:12px;
  border:none;
  border-radius:12px;

  background:linear-gradient(
  135deg,
  #4da3ff,
  #2979ff
  );

  color:#fff;
  font-weight:600;
  font-size:14px;

  box-shadow:
  0 4px 12px rgba(41,121,255,.25);

  transition:.25s;
}

.btn:hover{
  transform:translateY(-2px);
}

.btn:active{
  transform:scale(0.95);
}

/* ===== ACTION ROW ===== */
.action-row{
  display:flex;
  justify-content:center; /* ให้อยู่กลาง */
  gap:12px;
  margin-top:10px;
}

.action-row .btn{
  flex:0 0 140px;          /* ขนาดปุ่มเท่ากัน */
  box-shadow:0 4px 10px rgba(0,0,0,0.08);
  border-radius:10px;
}
/* ปุ่มคัดลอก / ล้าง = ปกติ */
.action-row .btn:first-child{
  background:#2ecc71;
  color:#fff;
  
}

.action-row .btn:first-child:hover{
  background:#27ae60;
  transform:scale(1.03);
}

.action-row .btn:last-child{
  background:#e74c3c;
  color:#fff;
}

.action-row .btn:last-child:hover{
  background:#c0392b;
  transform:translateY(-1px);
  transform:scale(1.03);
}
/*cssชุดเลข */
.extra-grid .main-btn,
.copy-btn{

  border-radius:8px;
  border:none;
  cursor:pointer;
  font-size:13px;
  transition:0.15s;
}

/* ปุ่มชุดเลข = ฟ้าเรียบ */
.extra-grid .main-btn{
  padding:12px;
  border:none;
  border-radius:14px;

  background:linear-gradient(
    135deg,
    #4f9cf9,
    #2f73ea

  color:#fff;
  font-size:14px;
  font-weight:600;

.extra-grid .main-btn:hover{

/* ปุ่มคัดลอก = เขียว */
.copy-btn{

  color:#fff;
}

.copy-btn:hover{
  transform:scale(1.02);
}

/* textarea ให้ดู clean */
#extraResult{
  width:100%;
  margin-top:10px;
  height:150px;
  padding:10px;
  border-radius:8px;
  border:1px solid #d6dbe6;
  font-family:inherit;
  font-size:13px;
  background:#fff;
  resize:none;
}
/* ===== RESULT GRID ===== */
.result-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(55px,1fr));
  gap:6px;
  margin-top:10px;
}

.num{

  border:1px solid #dce7ff;
  border-radius:10px;

}

.num:hover{

/* animation */
@keyframes fadeIn{
  from{opacity:0; transform:translateY(6px);}
  to{opacity:1; transform:translateY(0);}
}

/* ===== COUNT ===== */
.count{
  margin-top:8px;
  font-size:13px;
  color:#7f8c8d;
}

/* ===== PERMUTE BUTTON (เด่น + pulse เบา) ===== */
.permute-box{
  margin-top:14px;
  margin-bottom:8px;
}

.permute-btn{
  width:100%;
  background:linear-gradient(135deg,#ff9f43,#ff6b6b);
  color:#fff;
  font-weight:600;
  box-shadow:0 2px 8px rgba(255,107,107,0.25);
  transition:0.2s;
  animation:pulseSoft 2.5s infinite;
}

.permute-btn{
  width:100%;
  background:linear-gradient(135deg,#f1c40f,#f39c12);
  color:#1f1f1f;
  font-weight:600;

.permute-btn:active{

/* pulse เบา */
@keyframes pulseSoft{
  0%{box-shadow:0 0 0 0 rgba(255,107,107,0.25);}
  70%{box-shadow:0 0 0 6px rgba(255,107,107,0);}
  100%{box-shadow:0 0 0 0 rgba(255,107,107,0);}
}

/* ===== TOAST ===== */
#toast{
  position:fixed;
  top:25px;
  left:50%;
  z-index:100000;
  transform:translateX(-50%) translateY(-20px);
  background:linear-gradient(
    135deg,
    #4da3ff,
    #2f73ea
  );

  color:#fff;
  padding:14px 24px;
  border-radius:14px;
  font-size:16px;
  font-weight:600;

  box-shadow:
    0 8px 25px rgba(47,115,234,.35);
  opacity:0;
  transition:.3s;
}

#toast.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}
.btn, .permute-btn{
  position:relative;
  overflow:hidden;
}
.ripple{
  position:absolute;
  border-radius:50%;
  transform:scale(0);
  animation:rippleEffect 600ms linear;
  background:rgba(255,255,255,0.5);
  pointer-events:none;
}


@keyframes rippleEffect{
  to{
    transform:scale(4);
    opacity:0;
  }
}

 /* 🔥 ลายน้ำ 3 จุด */
.watermark {
  position: fixed;
  left: 50%;
  transform: translateX(-50%) rotate(-25deg);

<script>
    function requestTwo(){
  let val = document.getElementById("requestNum").value.trim();
  if(!val){ showToast("กรอกเลขก่อน"); return; }

  let result = val.split('').slice(0,2).join('');
  renderResult([result]);
  showToast("ได้ 2 ตัวแล้ว");
}

function requestThree(){
  let val = document.getElementById("requestNum").value.trim();
  if(!val){ showToast("กรอกเลขก่อน"); return; }

  let result = val.split('').slice(0,3).join('');
  renderResult([result]);
  showToast("ได้ 3 ตัวแล้ว");
}
let currentResult=[];

function showToast(msg){
  let t=document.getElementById("toast");
  t.innerText=msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),1500);
}

function renderResult(arr){
  currentResult=arr;
  let box=document.getElementById("resultGrid");
  box.innerHTML="";

  arr.forEach((n,i)=>{
    let div=document.createElement("div");
    div.className="num";
    div.innerText=n;

    // highlight 10 ตัวแรก
    

    box.appendChild(div);
  });

  document.getElementById("countText").innerText="จำนวนชุด: "+arr.length;
}

function generateWin(len,withDouble){
  let input=document.getElementById("inputNum").value.trim();
  let digits=[...new Set(input.split('').filter(n=>/\d/.test(n)))];

  if(digits.length<len){
    showToast("เลขไม่พอ");
    return;
  }

  let result=[];

  function combine(arr,len,start=0,prefix=[]){
    if(prefix.length===len){
      result.push(prefix.join(''));
      return;
    }
    for(let i=start;i<arr.length;i++){
      combine(arr,len,i+1,[...prefix,arr[i]]);
    }
  }

  combine(digits,len);

  if(withDouble){
    if(len===2) digits.forEach(d=>result.push(d+d));
    if(len===3){
      for(let i=0;i<digits.length;i++){
        for(let j=0;j<digits.length;j++){
          if(i!==j) result.push(digits[i]+digits[i]+digits[j]);
        }
      }
      digits.forEach(d=>result.push(d+d+d));
    }
  }

  result=[...new Set(result)].sort();
  renderResult(result);
}

function permute(){
  if(currentResult.length===0){
    showToast("ยังไม่มีผลลัพธ์");
    return;
  }

  let set=new Set();

  function perm(arr){
    if(arr.length<=1) return [arr];
    let res=[];
    for(let i=0;i<arr.length;i++){
      let rest=[...arr.slice(0,i),...arr.slice(i+1)];
      perm(rest).forEach(p=>res.push([arr[i],...p]));
    }
    return res;
  }

  currentResult.forEach(n=>{
    perm(n.split('')).forEach(p=>set.add(p.join('')));
  });

  renderResult([...set].sort());
}

function copyResult(){
  if(currentResult.length===0){
    showToast("ไม่มีข้อมูล");
    return;
  }
  navigator.clipboard.writeText(currentResult.join(' '));
  showToast("คัดลอกแล้ว");
}

function clearAll(){
  document.getElementById("inputNum").value="";
  document.getElementById("resultGrid").innerHTML="";
  document.getElementById("countText").innerText="จำนวนชุด: 0";
  currentResult=[];
  showToast("ล้างแล้ว");
}
document.querySelectorAll(".btn, .permute-btn").forEach(btn=>{
  btn.addEventListener("click", function(e){

    const circle = document.createElement("span");
    circle.classList.add("ripple");

    const rect = this.getBoundingClientRect();
    const size = Math.max(rect.width, rect.height);

    circle.style.width = circle.style.height = size + "px";
    circle.style.left = (e.clientX - rect.left - size/2) + "px";
    circle.style.top = (e.clientY - rect.top - size/2) + "px";

    this.appendChild(circle);

    setTimeout(()=>circle.remove(),600);
  });
});
function isTriple(num){
  return num[0] === num[1] && num[1] === num[2];
}
function showSet(type) {
  let result = [];

  if (type === 'haam') {
    for (let i = 0; i <= 9; i++)
      for (let j = 0; j <= 9; j++)
        result.push(`${i}${j}${i}`);
  }

  else if (type === 'front') {
    for (let i = 0; i <= 9; i++)
      for (let j = 0; j <= 9; j++)
        result.push(`${i}${i}${j}`);
  }

  else if (type === 'back') {
    for (let i = 0; i <= 9; i++)
      for (let j = 0; j <= 9; j++)
        result.push(`${i}${j}${j}`);
  }

else if (type === 'siblings') {
  result = [];

  for (let i = 0; i <= 8; i++) {
    result.push(`${i}${i + 1}`);
  }

  // ปิดรอบ 90
  result.push('90');
}

  else if (type === 'all') {
    for (let i = 0; i <= 9; i++) {
      for (let j = 0; j <= 9; j++) {
        result.push(`${i}${j}${i}`);
        result.push(`${i}${i}${j}`);
        result.push(`${i}${j}${j}`);
      }
    }
  }

 result = [...new Set(result)];

// ❌ ลบเลขตองออก
result = result.filter(n => !isTriple(n));

currentResult = result;
renderResult(currentResult);

document.getElementById("resultBox").scrollIntoView({
  behavior: "smooth",
  block: "start"
});

showToast("โหลดชุดเลขแล้ว");
}

function openSpecialPanel(){
  document
    .getElementById("specialOverlay")
    .classList.add("show");
}

  document
    .getElementById("specialOverlay")
    .classList.remove("show");
}
document.addEventListener("click", function(e){

  const popup = document.querySelector(".special-popup");
  const btn = document.querySelector(".special-btn");

  if(
      document.getElementById("specialOverlay")
      .classList.contains("show")
      &&
      !popup.contains(e.target)
      &&
      !btn.contains(e.target)
  ){
      closeSpecialPanel();
  }

});
